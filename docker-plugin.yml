services:
  plugin-manager:
    image: watink/plugin-manager:1.0.47
    build: ./plugin-manager
    environment:
      - PORT=3005
      - DATABASE_URL=postgres://postgres:postgres@watink_postgres:5432/watink?sslmode=disable
      - JWT_SECRET=3123123213123
    networks:
      - watink_public
      - watink_private
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.plugin-manager.rule=Host(`api.localhost`) && PathPrefix(`/plugins`)"
        - "traefik.http.routers.plugin-manager.entrypoints=web"
        - "traefik.http.routers.plugin-manager.priority=100"
        - "traefik.http.routers.plugin-manager.service=plugin-manager"
        - "traefik.http.services.plugin-manager.loadbalancer.server.port=3005"
        - "traefik.http.routers.plugin-manager.middlewares=plugin-strip"
        - "traefik.http.middlewares.plugin-strip.stripprefix.prefixes=/plugins"
        - "traefik.docker.network=watink_watink_public"

  plugin-smtp:
    image: watink/plugin-smtp:1.0.4
    build: ./plugins/watink-smtp-go
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - watink_private
    deploy:
      mode: replicated
      replicas: 1

networks:
  watink_public:
    external: true
    name: watink_watink_public
  watink_private:
    external: true
    name: watink_watink_private
