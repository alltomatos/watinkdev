version: '3.8'

services:
  watink:
    image: watink/industrial:latest
    build:
      context: .
      dockerfile: Dockerfile.industrial
    ports:
      - "80:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-***REMOVED_DB_PASS***}
      - DB_NAME=watink
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-***REMOVED_JWT_SECRET***}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - watink_net

  postgres:
    image: watink/postgres-postgis-pgvector:16-optimized
    environment:
      - POSTGRES_DB=watink
      - POSTGRES_PASSWORD=${DB_PASS:-***REMOVED_DB_PASS***}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - watink_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - watink_net

  redis:
    image: redis:alpine
    networks:
      - watink_net

networks:
  watink_net:
    driver: bridge

volumes:
  postgres_data:
