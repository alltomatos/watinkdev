name: CD Homolog

on:
  workflow_dispatch:
  push:
    branches: [devel_developer]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-stack.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-homolog
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta_backend.outputs.tags }}
      frontend_image: ${{ steps.meta_frontend.outputs.tags }}
      backend_image_primary: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:homol-${{ github.sha }}
      frontend_image_primary: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:homol-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=raw,value=homol-${{ github.sha }}
            type=raw,value=homol-latest

      - name: Docker metadata frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=homol-${{ github.sha }}
            type=raw,value=homol-latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy-homolog:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_HOMOLOG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Ensure namespace and registry secret
        run: |
          kubectl create namespace watink-homolog --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n watink-homolog create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_USER }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply homolog manifests
        run: kubectl apply -f k8s/homolog/stack.yaml

      - name: Update images (sha pinned)
        run: |
          kubectl -n watink-homolog set image deployment/watink-backend-homolog backend=${{ needs.build-and-push.outputs.backend_image_primary }}
          kubectl -n watink-homolog set image deployment/watink-frontend-homolog frontend=${{ needs.build-and-push.outputs.frontend_image_primary }}

      - name: Wait rollout
        run: |
          kubectl -n watink-homolog rollout status deployment/watink-backend-homolog --timeout=300s
          kubectl -n watink-homolog rollout status deployment/watink-frontend-homolog --timeout=300s

  smoke-tests:
    needs: deploy-homolog
    runs-on: ubuntu-latest
    steps:
      - name: API Health
        run: |
          for i in {1..20}; do
            if curl -fsS "https://apihomol.watink.com/version" >/dev/null; then
              echo "API OK"
              exit 0
            fi
            echo "Aguardando API... tentativa $i"
            sleep 10
          done
          echo "API healthcheck falhou"
          exit 1

      - name: Frontend Health
        run: |
          for i in {1..20}; do
            if curl -fsS "https://homol.watink.com" >/dev/null; then
              echo "Frontend OK"
              exit 0
            fi
            echo "Aguardando Frontend... tentativa $i"
            sleep 10
          done
          echo "Frontend healthcheck falhou"
          exit 1
