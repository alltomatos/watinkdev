server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_min_length 1000;
    gzip_keys_zone my_gzip:10m;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy is handled by Traefik externally, not Nginx in this architecture.
    # Nginx serves static files only. Traefik routes api.saas.watink.com to backend directly.
    # If using same domain saas.watink.com/api, we would need proxy_pass here.
    # But user requested "watink-api.rule=Host('api.saas.watink.com')", so separate domains.
    # Thus, simple SPA routing is sufficient.

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
