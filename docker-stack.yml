version: '3.8'

services:
  backend:
    image: watink/backend:1.3.170
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watink
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - JWT_SECRET=3123123213123
      - JWT_REFRESH_SECRET=75756756756
      - FRONTEND_URL=http://10.11.0.158
      - URL_BACKEND=http://10.11.0.158
      - ENGINE_VERSION=1.0.101
      - PORT=8080
      - NODE_OPTIONS=--max-old-space-size=800

    volumes:
      - ./backend/public:/app/public
    networks:
      - watink_public
      - watink_private

    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.backend-api.entrypoints=web"
        - "traefik.http.routers.backend-api.middlewares=backend-strip"
        - "traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api"
        - "traefik.http.routers.backend-api.service=backend"
        - "traefik.http.routers.backend-root.rule=PathPrefix(`/auth`) || PathPrefix(`/socket.io`) || PathPrefix(`/public`) || PathPrefix(`/docs`)"
        - "traefik.http.routers.backend-root.entrypoints=web"
        - "traefik.http.routers.backend-root.service=backend"
        - "traefik.http.services.backend.loadbalancer.server.port=8080"
        - "traefik.docker.network=watink_watink_public"

  frontend:
    image: watink/frontend:0.7.68
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      - URL_BACKEND=backend:8080
      - VITE_BACKEND_URL=/
      - VITE_PLUGIN_MANAGER_URL=/plugins/
      - VITE_HOURS_CLOSE_TICKETS_AUTO=24

    networks:
      - watink_public
      - watink_private

    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.routers.frontend.service=frontend"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
        - "traefik.docker.network=watink_watink_public"

  traefik:
    image: traefik:v3.4.0
    command:
      - "--api.dashboard=true"
      - "--providers.swarm=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=watink_watink_public"
      - "--entrypoints.web.address=:80"
    volumes:
      - "vol_certificates:/etc/traefik/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - watink_public
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 8080
        published: 8080
        mode: host
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=PathPrefix(`/dashboard`)"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.entrypoints=web"
        - "traefik.http.routers.dashboard.middlewares=auth"
        - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$8EVDtcp.$$J2A.0.1.0/0.1.0"

  whaileys-engine:
    image: watink/engine:1.0.101
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - watink_private
      - watink_public
    volumes:
      - sessions_auth_data:/usr/src/app/.sessions_auth/

    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 2048M

  flow-engine-worker:
    image: watink/backend:1.3.170
    command: ["node", "dist/flow-worker.js"]
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watink
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
    networks:
      - watink_private

    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  plugin-manager:
    image: watink/plugin-manager:1.0.19
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/watink?sslmode=disable
      - PLUGIN_CDN_URL=http://localhost
      - PORT=3005
      - ENVIRONMENT=production

    networks:
      - watink_private
      - watink_public

    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.plugins.rule=PathPrefix(`/plugins`)"
        - "traefik.http.routers.plugins.entrypoints=web"
        - "traefik.http.routers.plugins.middlewares=plugins-strip"
        - "traefik.http.middlewares.plugins-strip.stripprefix.prefixes=/plugins"
        - "traefik.http.services.plugins.loadbalancer.server.port=3005"
        - "traefik.docker.network=watink_watink_public"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - watink_private
    ports:
      - "15673:15672"

    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1024M

  postgres:
    image: ronaldodavi/pgvectorgis:latest
    environment:
      - POSTGRES_DB=watink
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - watink_private

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  watink_public:
    driver: overlay
  watink_private:
    driver: overlay

volumes:
  db_data:
  sessions_auth_data:
  backend_public_data:
  vol_certificates:
    external: true
    name: volume_swarm_certificates
