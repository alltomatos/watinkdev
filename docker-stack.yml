version: '3.8'

services:
  backend:
    image: watic-premium/backend:1.3.20
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watic
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
      - JWT_SECRET=***REMOVED_JWT_SECRET***
      - JWT_REFRESH_SECRET=***REMOVED_JWT_REFRESH_SECRET***
      - FRONTEND_URL=http://localhost
      - ENGINE_VERSION=1.0.35
      - PORT=8080
      - NODE_OPTIONS=--max-old-space-size=800
    ports:
      - "8080:8080"
    volumes:
      - backend_public_data:/app/public
    networks:

      - watic-premium_public
      - watic-premium_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M

  frontend:
    image: watic-premium/frontend:0.6.19
    environment:
      - URL_BACKEND=watic-premium_backend:8080
      - VITE_BACKEND_URL=http://localhost:8080/
      - FRONTEND_SERVER_NAME=localhost
    ports:
      - "80:80"
    networks:
      - watic-premium_public
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1

  whaileys-engine:
    image: watic-premium/engine:1.0.36
    environment:
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
    networks:
      - watic-premium_private
    volumes:
      - sessions_auth_data:/usr/src/app/.sessions_auth/
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M

  flow-engine-worker:
    image: watic-premium/backend:1.3.20
    command: ["node", "dist/src/flow-worker.js"]
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=watic
      - AMQP_URL=amqp://***REMOVED_AMQP_CREDENTIALS***@rabbitmq:5672
    networks:
      - watic-premium_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - watic-premium_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M

  postgres:
    image: ronaldodavi/pgvectorgis:latest
    environment:
      - POSTGRES_DB=watic
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - watic-premium_private
    dns:
      - 192.168.26.253
      - 8.8.8.8
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  watic-premium_public:
    driver: overlay
  watic-premium_private:
    driver: overlay

volumes:
  db_data:
  sessions_auth_data:
  backend_public_data:

