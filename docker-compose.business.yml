version: '3.8'

services:
  watink:
    image: watink/business:latest
    build:
      context: .
      dockerfile: Dockerfile.business
    user: "1000:1000"
    ports:
      - "80:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-watink_secret_pass}
      - DB_NAME=watink
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - uploads_data:/app/public
      - sessions_data:/app/.sessions_auth
    networks:
      - watink_net

  postgres:
    image: watink/postgres-postgis-pgvector:16-optimized
    environment:
      - POSTGRES_DB=watink
      - POSTGRES_PASSWORD=${DB_PASS:-watink_secret_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - watink_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - watink_net

  redis:
    image: redis:alpine
    networks:
      - watink_net

networks:
  watink_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  sessions_data:
